<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>便利店情景动画 · 录屏用</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden;
  font-family:"PingFang SC","Hiragino Sans","Noto Sans JP","Microsoft YaHei",sans-serif}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#stage{width:1080px;height:1920px;transform-origin:center;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#dff2fb 0%,#eaf7ff 40%,#f6fbff 100%)}

/* ── 顶部标题 ── */
.top{position:absolute;top:74px;left:0;right:0;text-align:center;z-index:6}
.top .badge{display:inline-block;background:rgba(14,116,144,.14);color:#0e7490;
  font-size:32px;font-weight:800;padding:14px 40px;border-radius:999px;letter-spacing:3px}
.top .title{margin-top:24px;font-size:76px;font-weight:900;color:#0d3b4d;letter-spacing:2px}

/* ── 场景 ── */
#scene{position:absolute;top:280px;left:0;right:0;height:900px;z-index:2}
#scene svg{width:100%;height:100%}

/* 角色呼吸 */
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
#clerk,#guest{animation:bob 3.4s ease-in-out infinite;transform-origin:center bottom}
#guest{animation-delay:-1.4s}

/* 说话：整体轻微放大 + 嘴动 */
#clerk.speaking,#guest.speaking{animation:bob 3.4s ease-in-out infinite, pop .45s ease-out}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.045)}100%{transform:scale(1)}}
@keyframes talk{0%,100%{ry:6}50%{ry:15}}
.speaking .mouth{animation:talk .32s ease-in-out infinite}

/* 高亮：没说话的人变淡 */
#clerk,#guest{transition:opacity .35s ease}
.dim{opacity:.45}

/* 道具：默认隐藏，按步骤显示 */
.prop{opacity:0;transition:opacity .45s ease,transform .45s ease;transform:translateY(14px)}
.prop.on{opacity:1;transform:none}
/* 微波炉加热发光 */
@keyframes glow{0%,100%{opacity:.25}50%{opacity:.95}}
#microGlow.on{animation:glow 1s ease-in-out infinite}
/* 热气 */
@keyframes steam{0%{opacity:0;transform:translateY(0) scaleX(1)}
  30%{opacity:.8}100%{opacity:0;transform:translateY(-46px) scaleX(1.5)}}
#steam.on path{animation:steam 2.2s ease-out infinite}
#steam.on path:nth-child(2){animation-delay:.7s}
#steam.on path:nth-child(3){animation-delay:1.4s}
/* 自动门的人影/灯带流动 */
@keyframes slide{0%{transform:translateX(0)}100%{transform:translateX(1080px)}}
#lightbar{animation:slide 6s linear infinite}

/* ── 字幕区 ── */
.subs{position:absolute;left:56px;right:56px;bottom:210px;z-index:6}
.card{background:rgba(255,255,255,.94);border-radius:38px;padding:44px 48px;
  box-shadow:0 22px 60px rgba(13,59,77,.22);opacity:0;transform:translateY(24px);
  transition:opacity .4s ease,transform .4s ease;border-left:14px solid #ff8a5c}
.card.show{opacity:1;transform:none}
.card.b{border-left-color:#2fae8b}
.who{display:inline-block;font-size:30px;font-weight:900;padding:9px 24px;
  border-radius:12px;background:#ffe0d2;color:#8a3410;margin-bottom:18px}
.card.b .who{background:#d5f3e9;color:#0f6a52}
.jp{font-size:62px;font-weight:900;color:#0e7490;line-height:1.3}
.ro{margin-top:12px;font-size:31px;font-style:italic;color:#c2710c}
.cn{margin-top:16px;font-size:44px;font-weight:800;color:#0d3b4d;
  opacity:0;transition:opacity .4s ease .55s}
.card.show .cn{opacity:1}
.hl{color:#e0455f}

/* ── 总结屏 ── */
#summary{position:absolute;inset:0;z-index:9;display:none;flex-direction:column;
  padding:120px 70px;gap:26px;background:linear-gradient(180deg,#eafaff,#a9ddee)}
#summary.on{display:flex}
#summary h2{font-size:64px;color:#0d3b4d;text-align:center;font-weight:900}
.sitem{border-left:8px solid #ff8a5c;padding-left:24px}
.sitem.b{border-left-color:#2fae8b}
.sitem .sj{font-size:42px;font-weight:900;color:#0e7490}
.sitem .sc{font-size:31px;color:#0d3b4d;margin-top:5px}

/* ── 进度 ── */
.dots{position:absolute;bottom:110px;left:0;right:0;z-index:7;display:flex;
  justify-content:center;gap:13px}
.dot{width:15px;height:15px;border-radius:50%;background:rgba(13,59,77,.22)}
.dot.on{background:#0e7490}

#ctrl{position:fixed;left:16px;bottom:16px;z-index:99;background:rgba(20,20,20,.9);
  color:#ddd;padding:13px 17px;border-radius:12px;font-size:13px;line-height:1.9;
  font-family:-apple-system,sans-serif}
#ctrl.hide{display:none}
#ctrl b{color:#7fe3c0}
</style>
</head>
<body>
<div id="wrap"><div id="stage">

  <div class="top">
    <span class="badge" id="badge"></span>
    <div class="title" id="title"></div>
  </div>

  <div id="scene">
  <svg viewBox="0 0 1080 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 墙面 -->
    <rect x="0" y="0" width="1080" height="620" fill="#eaf6fb"/>
    <!-- 顶部灯带 -->
    <rect x="0" y="18" width="1080" height="26" rx="13" fill="#fff9d9"/>
    <g clip-path="url(#lb)">
      <clipPath id="lb"><rect x="0" y="18" width="1080" height="26" rx="13"/></clipPath>
      <rect id="lightbar" x="-260" y="18" width="180" height="26" fill="#fff" opacity=".85"/>
    </g>

    <!-- 背景货架 -->
    <g>
      <rect x="60" y="120" width="360" height="330" rx="12" fill="#fdfefe" stroke="#c3ddea" stroke-width="5"/>
      <line x1="60" y1="230" x2="420" y2="230" stroke="#c3ddea" stroke-width="5"/>
      <line x1="60" y1="340" x2="420" y2="340" stroke="#c3ddea" stroke-width="5"/>
      <g fill="#7fd3c0"><rect x="86" y="150" width="52" height="66" rx="7"/><rect x="216" y="150" width="52" height="66" rx="7"/></g>
      <g fill="#ffb570"><rect x="151" y="150" width="52" height="66" rx="7"/><rect x="281" y="150" width="52" height="66" rx="7"/></g>
      <g fill="#ff9aa8"><rect x="86" y="260" width="52" height="66" rx="7"/><rect x="216" y="260" width="52" height="66" rx="7"/><rect x="346" y="150" width="52" height="66" rx="7"/></g>
      <g fill="#9fc9f5"><rect x="151" y="260" width="52" height="66" rx="7"/><rect x="281" y="260" width="52" height="66" rx="7"/><rect x="346" y="260" width="52" height="66" rx="7"/></g>
      <g fill="#ffd86b"><rect x="86" y="370" width="52" height="66" rx="7"/><rect x="216" y="370" width="52" height="66" rx="7"/><rect x="346" y="370" width="52" height="66" rx="7"/></g>
      <g fill="#b6e39b"><rect x="151" y="370" width="52" height="66" rx="7"/><rect x="281" y="370" width="52" height="66" rx="7"/></g>
    </g>

    <!-- 微波炉 -->
    <g>
      <rect x="700" y="180" width="250" height="150" rx="14" fill="#f2f7fa" stroke="#a9c6d6" stroke-width="6"/>
      <rect x="722" y="202" width="150" height="106" rx="9" fill="#2b3f4b"/>
      <rect id="microGlow" class="prop" x="722" y="202" width="150" height="106" rx="9" fill="#ffcf5c"/>
      <circle cx="912" cy="232" r="15" fill="#cfe0ea"/>
      <rect x="893" y="266" width="40" height="12" rx="6" fill="#cfe0ea"/>
    </g>

    <!-- 收银台 -->
    <rect x="0" y="620" width="1080" height="280" fill="#e7f2f7"/>
    <rect x="120" y="600" width="840" height="52" rx="12" fill="#d3e7f0"/>
    <rect x="120" y="640" width="840" height="230" fill="#f7fbfd" stroke="#c3ddea" stroke-width="5"/>

    <!-- 收银机 -->
    <g>
      <rect x="690" y="470" width="200" height="140" rx="12" fill="#f2f7fa" stroke="#a9c6d6" stroke-width="6"/>
      <rect x="712" y="492" width="156" height="56" rx="8" fill="#123240"/>
      <text id="price" class="prop" x="790" y="533" font-size="38" font-weight="800"
            fill="#7fe3c0" text-anchor="middle" font-family="monospace">¥520</text>
      <g fill="#cfe0ea"><rect x="712" y="562" width="34" height="26" rx="6"/>
        <rect x="753" y="562" width="34" height="26" rx="6"/><rect x="794" y="562" width="34" height="26" rx="6"/>
        <rect x="835" y="562" width="33" height="26" rx="6"/></g>
    </g>

    <!-- 店员（右） -->
    <g id="clerk">
      <ellipse cx="810" cy="880" rx="92" ry="16" fill="#cfe3ec" opacity=".55"/>
      <path d="M726 866 L726 700 Q810 656 894 700 L894 866 Z" fill="#3fb98a"/>
      <rect x="778" y="700" width="64" height="166" fill="#f5fbf8"/>
      <rect x="700" y="716" width="34" height="120" rx="17" fill="#3fb98a"/>
      <rect x="886" y="716" width="34" height="120" rx="17" fill="#3fb98a"/>
      <circle cx="810" cy="620" r="72" fill="#ffe0c4"/>
      <path d="M736 604 Q810 540 884 604 L884 588 Q810 528 736 588 Z" fill="#2f9c74"/>
      <rect x="728" y="596" width="164" height="20" rx="10" fill="#2f9c74"/>
      <circle cx="786" cy="622" r="8" fill="#2b3f4b"/><circle cx="836" cy="622" r="8" fill="#2b3f4b"/>
      <ellipse class="mouth" cx="811" cy="656" rx="15" ry="6" fill="#c0524d"/>
      <circle cx="762" cy="646" r="12" fill="#ffb5a0" opacity=".6"/>
      <circle cx="858" cy="646" r="12" fill="#ffb5a0" opacity=".6"/>
    </g>

    <!-- 客人（左） -->
    <g id="guest">
      <ellipse cx="300" cy="880" rx="92" ry="16" fill="#cfe3ec" opacity=".55"/>
      <path d="M216 866 L216 700 Q300 656 384 700 L384 866 Z" fill="#6aa8e8"/>
      <rect x="190" y="716" width="34" height="120" rx="17" fill="#6aa8e8"/>
      <rect x="376" y="716" width="34" height="120" rx="17" fill="#6aa8e8"/>
      <circle cx="300" cy="620" r="72" fill="#ffe0c4"/>
      <path d="M228 606 Q234 528 300 528 Q366 528 372 606 Q356 566 300 566 Q244 566 228 606 Z" fill="#4a3a33"/>
      <circle cx="276" cy="622" r="8" fill="#2b3f4b"/><circle cx="326" cy="622" r="8" fill="#2b3f4b"/>
      <ellipse class="mouth" cx="301" cy="656" rx="15" ry="6" fill="#c0524d"/>
      <circle cx="252" cy="646" r="12" fill="#ffb5a0" opacity=".6"/>
      <circle cx="348" cy="646" r="12" fill="#ffb5a0" opacity=".6"/>
    </g>

    <!-- 柜台上的道具 -->
    <g id="bento" class="prop">
      <rect x="470" y="596" width="150" height="58" rx="9" fill="#ffffff" stroke="#d8a24a" stroke-width="5"/>
      <rect x="484" y="606" width="58" height="38" rx="5" fill="#fdf6e6"/>
      <circle cx="513" cy="625" r="9" fill="#e0455f"/>
      <rect x="550" y="606" width="26" height="38" rx="4" fill="#f6b26b"/>
      <rect x="582" y="606" width="26" height="38" rx="4" fill="#8fc98a"/>
    </g>
    <g id="steam" class="prop" fill="none" stroke="#b8d6e2" stroke-width="6" stroke-linecap="round">
      <path d="M510 590 q-12 -22 0 -42"/><path d="M545 590 q12 -24 0 -46"/><path d="M578 590 q-12 -22 0 -40"/>
    </g>
    <g id="bag" class="prop">
      <path d="M410 600 L410 540 Q410 512 440 512 Q470 512 470 540 L470 600 Z"
            fill="none" stroke="#9dbccb" stroke-width="6"/>
      <rect x="386" y="596" width="108" height="62" rx="7" fill="#f4fafd" stroke="#9dbccb" stroke-width="6"/>
    </g>
    <g id="card" class="prop">
      <rect x="470" y="600" width="126" height="76" rx="10" fill="#ffd86b" stroke="#c99b2e" stroke-width="5"/>
      <rect x="486" y="620" width="60" height="10" rx="5" fill="#8a6a1c"/>
      <rect x="486" y="640" width="86" height="10" rx="5" fill="#8a6a1c" opacity=".6"/>
    </g>
  </svg>
  </div>

  <div class="subs" id="subs"></div>
  <div class="dots" id="dots"></div>
  <div id="summary"></div>
</div></div>

<div id="ctrl">
  空格/→ 下一句 · ← 上一句 · S 重听 · R 重来 · <b>A 自动播放</b> · <b>H 隐藏面板</b>
</div>

<script>
const DECK = {
  badge:"情景模拟",
  title:"在日本便利店",
  lines:[
    {who:"店员", role:"b", jp:"いらっしゃいませ。", ro:"irasshaimase",
     cn:"欢迎光临。", props:[]},
    {who:"店员", role:"b", jp:"お弁当温めますか。", read:"おべんとうあたためますか",
     ro:"obentou atatamemasu ka", cn:"便当需要加热吗？", props:["bento"]},
    {who:"客人", role:"a", jp:"はい、お願いします。", read:"はい、おねがいします",
     ro:"hai, onegai shimasu", cn:"好的，麻烦了。", props:["bento","microGlow"]},
    {who:"店员", role:"b", jp:"袋はご利用ですか。", read:"ふくろはごりようですか",
     ro:"fukuro wa goriyou desu ka", cn:"需要袋子吗？", props:["bento","steam","bag"]},
    {who:"客人", role:"a", jp:"大丈夫です。", read:"だいじょうぶです",
     ro:"daijoubu desu", cn:'不用了。<span class="hl">（不是「没问题」！）</span>', props:["bento","steam"]},
    {who:"店员", role:"b", jp:"ポイントカードはお持ちですか。", read:"ポイントカードはおもちですか",
     ro:"pointo kaado wa omochi desu ka", cn:"有积分卡吗？", props:["card"]},
    {who:"客人", role:"a", jp:"持っていません。", read:"もっていません",
     ro:"motte imasen", cn:"没有。", props:[]},
    {who:"店员", role:"b", jp:"五百二十円になります。", read:"ごひゃくにじゅうえんになります",
     ro:"gohyaku nijuu en ni narimasu", cn:"一共520日元。", props:["price"]}
  ],
  summaryTitle:"📌 收藏起来，去日本前翻一遍"
};

function fit(){const s=Math.min(innerWidth/1080,innerHeight/1920);
  document.getElementById('stage').style.transform='scale('+s+')';}
addEventListener('resize',fit);fit();

document.getElementById('badge').textContent=DECK.badge;
document.getElementById('title').textContent=DECK.title;

const subs=document.getElementById('subs');
DECK.lines.forEach(l=>{
  const d=document.createElement('div');
  d.className='card '+l.role;
  d.innerHTML='<div class="who">'+l.who+'</div><div class="jp">'+l.jp+
    '</div><div class="ro">'+l.ro+'</div><div class="cn">'+l.cn+'</div>';
  d.style.display='none';
  subs.appendChild(d);
});
const cards=[...document.querySelectorAll('.card')];

const dots=document.getElementById('dots');
DECK.lines.forEach(()=>{const s=document.createElement('div');s.className='dot';dots.appendChild(s);});
const dotEls=[...document.querySelectorAll('.dot')];

const sum=document.getElementById('summary');
sum.innerHTML='<h2>'+DECK.summaryTitle+'</h2>'+DECK.lines.map(l=>
  '<div class="sitem '+l.role+'"><div class="sj">'+l.jp+'</div><div class="sc">'+
  l.cn.replace(/<[^>]+>/g,'')+'</div></div>').join('');

const ALLPROPS=['bento','steam','bag','card','price','microGlow'];
const clerk=document.getElementById('clerk'), guest=document.getElementById('guest');
let idx=-1, auto=false, timer=null;

function speak(i){
  const l=DECK.lines[i]; if(!l||!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(l.read||l.jp);
  u.lang='ja-JP'; u.rate=.92;
  if(auto) u.onend=()=>{ timer=setTimeout(next,1500); };
  speechSynthesis.speak(u);
}
function render(){
  cards.forEach((c,i)=>{
    c.style.display = i===idx ? 'block' : 'none';
    c.classList.toggle('show', i===idx);
  });
  dotEls.forEach((d,i)=>d.classList.toggle('on', i<=idx));
  sum.classList.toggle('on', idx>=DECK.lines.length);

  const l=DECK.lines[idx];
  ALLPROPS.forEach(p=>document.getElementById(p)
    .classList.toggle('on', !!(l && l.props.includes(p))));

  clerk.classList.remove('speaking','dim'); guest.classList.remove('speaking','dim');
  if(l){
    if(l.role==='b'){ clerk.classList.add('speaking'); guest.classList.add('dim'); }
    else { guest.classList.add('speaking'); clerk.classList.add('dim'); }
  }
}
function next(){ clearTimeout(timer);
  if(idx>=DECK.lines.length){ auto=false; return; }
  idx++; render();
  if(idx<DECK.lines.length) speak(idx);
  else if(auto) auto=false;
}
function prev(){ clearTimeout(timer); if(idx>-1){ idx--; render(); } }

addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();next();}
  else if(e.code==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='s'||e.key==='S'){speak(idx);}
  else if(e.key==='r'||e.key==='R'){clearTimeout(timer);auto=false;idx=-1;render();}
  else if(e.key==='a'||e.key==='A'){auto=!auto; if(auto) next();}
  else if(e.key==='h'||e.key==='H'){document.getElementById('ctrl').classList.toggle('hide');}
});
addEventListener('click',e=>{ if(e.target.closest('#ctrl')) return; next(); });
render();
</script>
</body>
</html>
