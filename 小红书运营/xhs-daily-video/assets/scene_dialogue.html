<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>情景模拟对话 · 录屏用</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden;
  font-family:"PingFang SC","Hiragino Sans","Noto Sans JP","Microsoft YaHei",sans-serif}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#stage{width:1080px;height:1920px;transform-origin:center;position:relative;overflow:hidden;
  background:#1b1410}

/* ── 背景实景图 ── */
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#bgFallback{position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 30% at 25% 18%, rgba(255,196,120,.55), transparent 70%),
    radial-gradient(ellipse 50% 26% at 72% 12%, rgba(255,170,90,.45), transparent 70%),
    linear-gradient(180deg,#3a2418 0%,#241610 45%,#160e0a 100%)}
#scrim{position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.15) 28%,
    rgba(0,0,0,.55) 62%,rgba(0,0,0,.88) 100%)}

/* ── 顶部标题 ── */
.top{position:absolute;top:0;left:0;right:0;padding:86px 70px 0;text-align:center;z-index:3}
.top .badge{display:inline-block;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);
  color:#fff;font-size:34px;font-weight:700;padding:16px 44px;border-radius:999px;
  letter-spacing:2px;border:2px solid rgba(255,255,255,.28)}
.top .title{margin-top:30px;font-size:82px;font-weight:900;color:#fff;
  text-shadow:0 6px 30px rgba(0,0,0,.75);letter-spacing:3px}
.top .sub{margin-top:16px;font-size:38px;color:rgba(255,255,255,.82);
  text-shadow:0 4px 18px rgba(0,0,0,.7)}

/* ── 字幕区 ── */
.subs{position:absolute;left:0;right:0;bottom:150px;z-index:3;
  padding:0 62px;display:flex;flex-direction:column;justify-content:flex-end;gap:30px;
  min-height:900px}
.line{opacity:0;transform:translateY(26px);
  transition:opacity .4s ease,transform .4s ease}
.line.show{opacity:.42;transform:none}
.line.cur{opacity:1}
.who{display:inline-block;font-size:30px;font-weight:800;padding:9px 26px;border-radius:12px;
  margin-bottom:16px;letter-spacing:2px}
.line.a .who{background:#ff8a5c;color:#2b1206}
.line.b .who{background:#5ccfb0;color:#04241c}
.jp{font-size:64px;font-weight:900;color:#fff;line-height:1.32;
  text-shadow:0 5px 26px rgba(0,0,0,.85)}
.line.cur .jp{color:#ffe9a8}
.ro{margin-top:12px;font-size:32px;font-style:italic;color:rgba(255,255,255,.72)}
.cn{margin-top:14px;font-size:44px;font-weight:800;color:#fff;
  text-shadow:0 4px 20px rgba(0,0,0,.85);opacity:0;transition:opacity .45s ease .6s}
.line.show .cn,.line.cur .cn{opacity:1}

/* ── 总结屏 ── */
#summary{position:absolute;inset:0;z-index:5;display:none;flex-direction:column;
  padding:130px 76px;gap:30px;background:rgba(10,8,6,.93);backdrop-filter:blur(14px)}
#summary.on{display:flex}
#summary h2{font-size:66px;color:#ffe9a8;text-align:center;font-weight:900}
.sitem{border-left:7px solid #ff8a5c;padding-left:26px}
.sitem.b{border-left-color:#5ccfb0}
.sitem .sj{font-size:44px;font-weight:800;color:#fff}
.sitem .sc{font-size:32px;color:rgba(255,255,255,.78);margin-top:6px}

/* ── 进度点 ── */
.dots{position:absolute;bottom:66px;left:0;right:0;z-index:4;display:flex;
  justify-content:center;gap:14px}
.dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.3)}
.dot.on{background:#ffe9a8}

/* ── 控制条（录屏时不会拍到，在舞台外）── */
#ctrl{position:fixed;left:16px;bottom:16px;z-index:99;background:rgba(20,20,20,.9);
  color:#ddd;padding:14px 18px;border-radius:12px;font-size:13px;line-height:1.9;
  font-family:-apple-system,sans-serif}
#ctrl input{margin-left:8px;font-size:12px}
#ctrl.hide{display:none}
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <div id="bgFallback"></div>
  <img id="bg" style="display:none">
  <div id="scrim"></div>

  <div class="top">
    <span class="badge" id="badge"></span>
    <div class="title" id="title"></div>
    <div class="sub" id="sub"></div>
  </div>

  <div class="subs" id="subs"></div>
  <div class="dots" id="dots"></div>
  <div id="summary"></div>
</div></div>

<div id="ctrl">
  空格/→ 下一句 · ← 上一句 · S 重听 · R 重来 · <b>H 隐藏此面板</b><br>
  换背景图：<input type="file" id="bgpick" accept="image/*">
</div>

<script>
/* ═══════════ 只改这一块 DECK ═══════════ */
const DECK = {
  badge: "情景模拟",
  title: "日本餐厅对话",
  sub  : "— 以居酒屋为例",
  // 背景图：留空用内置的居酒屋氛围渐变；也可以填图片路径，或直接用左下角的文件选择器
  bg   : "",
  // who 用 A/B 区分左右配色；第一个出现的是 A
  lines: [
    {who:"店员", jp:"いらっしゃいませ。何名様ですか。", read:"いらっしゃいませ。なんめいさまですか",
     ro:"irasshaimase. nanmei sama desu ka", cn:"欢迎光临，请问几位？"},
    {who:"客人", jp:"二人です。", read:"ふたりです",
     ro:"futari desu", cn:"两位。"},
    {who:"店员", jp:"お飲み物は何になさいますか。", read:"おのみものはなにになさいますか",
     ro:"onomimono wa nani ni nasaimasu ka", cn:"请问喝点什么？"},
    {who:"客人", jp:"とりあえず生ビールをください。", read:"とりあえずなまビールをください",
     ro:"toriaezu nama biiru o kudasai", cn:"先来杯生啤吧。"},
    {who:"店员", jp:"ご注文はお決まりですか。", read:"ごちゅうもんはおきまりですか",
     ro:"gochuumon wa okimari desu ka", cn:"决定好点什么了吗？"},
    {who:"客人", jp:"焼き鳥の盛り合わせをお願いします。", read:"やきとりのもりあわせをおねがいします",
     ro:"yakitori no moriawase o onegai shimasu", cn:"来一份烤串拼盘。"},
    {who:"客人", jp:"すみません、お会計お願いします。", read:"すみません、おかいけいおねがいします",
     ro:"sumimasen, okaikei onegai shimasu", cn:"不好意思，我要结账。"},
    {who:"店员", jp:"別々になさいますか。", read:"べつべつになさいますか",
     ro:"betsubetsu ni nasaimasu ka", cn:"请问要分开结吗？"}
  ],
  summaryTitle: "📌 收藏，去日本前翻一遍"
};
/* ═══════════ 以下是引擎 ═══════════ */

function fit(){
  const s=Math.min(innerWidth/1080, innerHeight/1920);
  document.getElementById('stage').style.transform='scale('+s+')';
}
addEventListener('resize',fit); fit();

document.getElementById('badge').textContent=DECK.badge;
document.getElementById('title').textContent=DECK.title;
document.getElementById('sub').textContent=DECK.sub;

if(DECK.bg){
  const im=document.getElementById('bg');
  im.src=DECK.bg; im.style.display='block';
}
document.getElementById('bgpick').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const im=document.getElementById('bg');
  im.src=URL.createObjectURL(f); im.style.display='block';
});

const roles=[...new Set(DECK.lines.map(l=>l.who))];
const cls=w=>w===roles[0]?'a':'b';

const subs=document.getElementById('subs');
DECK.lines.forEach(l=>{
  const d=document.createElement('div');
  d.className='line '+cls(l.who);
  d.innerHTML='<div class="who">'+l.who+'</div>'+
    '<div class="jp">'+l.jp+'</div>'+
    '<div class="ro">'+l.ro+'</div>'+
    '<div class="cn">'+l.cn+'</div>';
  subs.appendChild(d);
});
const lines=[...document.querySelectorAll('.line')];

const dots=document.getElementById('dots');
DECK.lines.forEach(()=>{const s=document.createElement('div');s.className='dot';dots.appendChild(s);});
const dotEls=[...document.querySelectorAll('.dot')];

const sum=document.getElementById('summary');
sum.innerHTML='<h2>'+DECK.summaryTitle+'</h2>'+
  DECK.lines.map(l=>'<div class="sitem '+cls(l.who)+'"><div class="sj">'+l.jp+
  '</div><div class="sc">'+l.cn+'</div></div>').join('');

let idx=-1;
function speak(i){
  const l=DECK.lines[i]; if(!l||!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(l.read||l.jp);
  u.lang='ja-JP'; u.rate=.92; speechSynthesis.speak(u);
}
function render(){
  // 只显示当前句 + 前 1 句（像真字幕，不堆满屏）
  lines.forEach((el,i)=>{
    el.classList.remove('show','cur');
    el.style.display='none';
    if(i===idx){ el.style.display='block'; el.classList.add('show','cur'); }
    else if(i===idx-1){ el.style.display='block'; el.classList.add('show'); }
  });
  dotEls.forEach((d,i)=>d.classList.toggle('on', i<=idx));
  sum.classList.toggle('on', idx>=DECK.lines.length);
}
function next(){ if(idx>=DECK.lines.length) return;
  idx++; render(); if(idx<DECK.lines.length) speak(idx); }
function prev(){ if(idx>-1){ idx--; render(); } }

addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();next();}
  else if(e.code==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='s'||e.key==='S'){speak(idx);}
  else if(e.key==='r'||e.key==='R'){idx=-1;render();}
  else if(e.key==='h'||e.key==='H'){document.getElementById('ctrl').classList.toggle('hide');}
});
addEventListener('click',e=>{ if(e.target.closest('#ctrl')) return; next(); });
render();
</script>
</body>
</html>
